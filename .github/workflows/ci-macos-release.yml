name: CI and macOS package

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: copilot-api-proxy

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run test suite
        run: cargo test --locked

  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Compute package name
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-manual}"
          version="${version//\//-}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="${version}-${GITHUB_SHA::7}"
          fi
          archive="${BINARY_NAME}-${version}-${{ matrix.target }}.tar.gz"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Package macOS binary
        shell: bash
        run: |
          pkg_dir="dist/${BINARY_NAME}-${{ matrix.target }}"
          mkdir -p "${pkg_dir}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${pkg_dir}/"
          cp README.md LICENSE "${pkg_dir}/"
          tar -C "${pkg_dir}" -czf "dist/${{ steps.package.outputs.archive }}" .

      - name: Upload packaged binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.package.outputs.archive }}
          path: dist/${{ steps.package.outputs.archive }}
          if-no-files-found: error
